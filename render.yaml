services:
  - type: web
    name: cup2026-backend
    env: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: apache2-foreground
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: 127.0.0.1
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: cup_2026_db
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        value: postgres
      - key: APP_KEY
        value: base64:yP1pQ4tM3JjN...
